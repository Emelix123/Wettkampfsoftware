<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - Wettkampf Manager</title>
    <style>
        /* Hier kannst du dein CSS von base.html einfügen oder eine separate CSS-Datei verlinken */
        body { font-family: Arial, sans-serif; margin: 20px; }
        form div { margin-bottom: 10px; }
        label { display: inline-block; width: 150px; } /* Etwas breiter für "Passwort bestätigen" */
        input[type="text"], input[type="password"], input[type="email"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .flash-message { padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .flash-message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash-message.danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .flash-message.warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <h1>Registrieren</h1>

    <div id="flash-messages">
        </div>

    <form id="registerForm">
        <div>
            <label for="username">Benutzername:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="password">Passwort:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div>
            <label for="confirm_password">Passwort bestätigen:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit">Registrieren</button>
    </form>

    <p>Bereits registriert? <a href="/login">Jetzt anmelden</a></p>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const form = event.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/loginCheck', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            // WICHTIG: Zuerst prüfen, ob ein Redirect gesendet wurde
            if (response.redirected) {
                // Wenn Flask eine Umleitung gesendet hat (erfolgreicher Login)
                window.location.href = response.url; // Navigiere zur Ziel-URL
                return; // Beende die Funktion, da keine JSON-Antwort erwartet wird
            }

            // Nur hierher kommen wir, wenn KEIN Redirect gesendet wurde (also im Fehlerfall)
            const responseData = await response.json(); // Hier erwarten wir jetzt JSON vom Server

            // Zeige die Flash-Nachricht an (kommt jetzt nur von jsonify-Fehlerantworten)
            displayFlashMessages(responseData.message, responseData.category);

            if (response.ok) {
                // Dieser Block sollte bei Login-Erfolg in deinem Setup nicht mehr erreicht werden,
                // da bei Erfolg immer redirected wird. Hier würden z.B. andere erfolgreiche
                // Aktionen ohne Redirect landen.
                console.log("Login erfolgreich, aber unerwarteterweise kein Redirect erhalten. Empfangene Daten:", responseData);
            } else {
                // Dies sind die expliziten Fehler von Flask (400, 401, 500 etc.)
                console.error('Login fehlgeschlagen:', response.status, responseData);
            }

        } catch (error) {
            console.error('Fehler beim Senden der Anfrage:', error);
            let errorMessage = 'Ein unerwarteter Fehler ist aufgetreten.';
            // Wenn der SyntaxError auftritt, war die Antwort kein gültiges JSON
            if (error instanceof SyntaxError && error.message.includes('Unexpected token')) {
                errorMessage = 'Unerwartete Antwort vom Server. Es wurde kein gültiges JSON empfangen.';
            }
            displayFlashMessages(errorMessage, 'danger');
        }
    });

    function displayFlashMessages(message, category) {
        const flashContainer = document.getElementById('flash-messages');
        flashContainer.innerHTML = ''; // Vorherige Nachrichten löschen
        if (message) {
            const div = document.createElement('div');
            div.className = `flash-message ${category}`;
            div.textContent = message;
            flashContainer.appendChild(div);
        }
    }
</script>
</body>
</html>
