server {
    listen 80;

    # Flask Anwendung (läuft z.B. mit Gunicorn auf Port 5000)
    location / {
        # Wichtig: Weiterleiten ALLER Anfragen an die Flask App
        proxy_pass http://backend:5000; # Adresse deines Gunicorn/Waitress Prozesses
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Statische Dateien direkt durch Nginx ausliefern
    location /static {
        # Pfad zum static-Ordner deines Flask-Projekts
        # Achtung: Ordner muss dann noch /static beinhalten!
        root /usr/share/nginx/html;
        expires 30d; # Optional: Caching-Header setzen
        access_log off; # Optional: Logging für statische Dateien deaktivieren
    }
}
