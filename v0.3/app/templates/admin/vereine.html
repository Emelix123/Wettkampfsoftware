{% extends "base.html" %}
{% block title %}Vereine{% endblock %}
{% block content %}
<div class="flex items-center mb-4 gap-3">
  <h1 class="text-2xl font-bold">Vereine</h1>
  <a href="/admin" class="text-sm text-brand-600 hover:underline">← zurueck</a>
</div>

<div class="grid md:grid-cols-3 gap-4">
  <form method="post" action="/admin/vereine" class="card md:col-span-1 space-y-3">
    <h2 class="font-semibold">Neuer Verein</h2>
    <div><label class="label">Kuerzel</label><input class="input" name="Kuerzel" required maxlength="10"></div>
    <div><label class="label">Name</label><input class="input" name="Name" required></div>
    <div><label class="label">Ort</label><input class="input" name="Ort"></div>
    <button class="btn btn-primary">Anlegen</button>
  </form>
  <div class="card md:col-span-2 overflow-x-auto">
    <table class="table">
      <thead><tr><th>Kuerzel</th><th>Name</th><th>Ort</th><th></th></tr></thead>
      <tbody>
        {% for v in items %}
        <tr>
          <td><span class="badge">{{ v.Kuerzel }}</span></td>
          <td>{{ v.Name }}</td>
          <td class="text-slate-500">{{ v.Ort or '—' }}</td>
          <td class="text-right">
            <form method="post" action="/admin/vereine/{{ v.idVerein }}/delete" onsubmit="return confirm('Verein wirklich loeschen?')">
              <button class="btn btn-danger">loeschen</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="text-slate-400 italic text-center">Noch keine Vereine.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
