<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>{% block title %}{% endblock %}</title>
<style>
  @page { size: A4; margin: 18mm; @bottom-right { content: "Seite " counter(page) " / " counter(pages); font-size: 9pt; color:#666; } }
  body { font-family: 'DejaVu Sans', sans-serif; font-size: 11pt; color:#222; }
  h1 { font-size: 20pt; margin: 0 0 4pt 0; color:#1e40af; }
  h2 { font-size: 14pt; margin: 16pt 0 6pt 0; color:#1e40af; border-bottom:1px solid #cbd5e1; padding-bottom:2pt; }
  .meta { color:#555; font-size: 10pt; margin-bottom: 12pt; }
  table { border-collapse: collapse; width: 100%; font-size: 10pt; margin-bottom: 8pt; }
  th, td { padding: 4pt 6pt; border-bottom: 1px solid #e2e8f0; text-align: left; vertical-align: middle; }
  th { background: #f1f5f9; color: #334155; font-weight: 600; }
  tr.gold td { background: #fef3c7; font-weight: 600; }
  tr.silver td { background: #f1f5f9; }
  tr.bronze td { background: #ffedd5; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .urkunde { page-break-after: always; text-align:center; padding-top: 40mm; }
  .urkunde h1 { font-size: 36pt; margin-bottom: 18pt; }
  .urkunde .name { font-size: 28pt; font-weight: bold; margin-bottom: 8pt; }
  .urkunde .platz { font-size: 22pt; margin-top: 18pt; color:#1e40af; }
  .urkunde .score { font-size: 18pt; margin-top: 8pt; }
  .urkunde .footer { margin-top: 60mm; font-size: 12pt; color:#555; }
  footer.head { font-size:9pt; color:#888; margin-bottom: 4pt;}
  {% block extra_style %}{% endblock %}
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
