{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 card">
  <h1 class="text-2xl font-bold mb-1">🏅 Wettkampfsoftware</h1>
  <p class="text-slate-500 text-sm mb-6">Bitte einloggen.</p>
  {% if error %}
    <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-800 rounded text-sm">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4">
    {{ csrf_input(request) }}
    <div>
      <label class="label">Benutzername</label>
      <input class="input" name="username" autocomplete="username" required>
    </div>
    <div>
      <label class="label">Passwort</label>
      <input class="input" type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn btn-primary w-full justify-center">Login</button>
  </form>
  <p class="text-xs text-slate-400 mt-6 text-center">Standard-Admin: admin / admin123 (bitte aendern)</p>
</div>
{% endblock %}
